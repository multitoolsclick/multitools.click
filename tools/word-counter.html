<!DOCTYPE html>
<html>
<head>
<title>Word Counter Tool</title>
<meta name="description" content="Free online word counter tool. Count words and characters instantly.">
</head>

<body>

<h1>Word Counter</h1>

<textarea id="text" rows="10" cols="50" placeholder="Paste your text here"></textarea>

<br><br>

<button onclick="countWords()">Count Words</button>

<p id="result"></p>

<script>
function countWords() {
let text = document.getElementById("text").value;

let words = text.trim().split(/\s+/).filter(function(word){
return word.length > 0;
});

let characters = text.length;

document.getElementById("result").innerHTML =
"Words: " + words.length + "<br>Characters: " + characters;
}
</script>

</body>
</html>
